services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    # Одинаковые лимиты для честного сравнения (Compose v2 применяет без Swarm)
    mem_limit: 512m
    cpus: 1.0

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "no"]
    mem_limit: 512m
    cpus: 1.0
